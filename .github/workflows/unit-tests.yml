name: Unit Tests

on:
  push:
  pull_request:

jobs:

  unit-tests:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.3"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest -v -m "not integration" --junitxml=report.xml
    
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
            name: unit-report
            path: report.xml