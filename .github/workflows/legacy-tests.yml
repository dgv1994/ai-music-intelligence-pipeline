name: Python Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.3"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -v --junitxml=report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml
          
      - name: Update Notion on test failure
        if: failure()
        run: |
          curl -X PATCH "https://api.notion.com/v1/databases/eda9f31d-991b-82e9-9ec7-0118af539d76/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}"" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"properties": {"Automation Status": {"select": {"name": "Obsolete"}}}}'